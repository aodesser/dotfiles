right_format = "$time"

[username]
show_always = true
format = "[$user]($style)@"

[hostname]
ssh_only = false
format = "[$hostname]($style) "

[directory]
truncation_length = 1
style = "bold cyan"

[line_break]
disabled = true

[git_branch]
symbol = " "

[git_status]
staged = "[+${count}](green)"
modified = "[~${count}](yellow)"
deleted = "[-${count}](red)"
untracked = "[?${count}](grey)"
ahead = "⇡${count}"
behind = "⇣${count}"

[cmd_duration]
min_time = 2_000
format = "[took $duration](bold yellow)"

[status]
disabled = false
symbol = "✗"
format = "[$symbol $status]($style) "

[time]
disabled = false
format = "[🕐 $time]($style)"
time_format = "%H:%M"

[kubernetes]
disabled = false
format = "[⎈ $context\\($namespace\\)]($style) "

[aws]
disabled = false
format = "[☁️ $profile]($style) "

# Disable language version modules
[gradle]
disabled = true

[java]
disabled = true

[kotlin]
disabled = true

[python]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[ruby]
disabled = true
