[line_break]
disabled = true

[git_branch]
symbol = " "

[git_status]
staged = "[+${count}](green)"
modified = "[~${count}](yellow)"
deleted = "[-${count}](red)"
untracked = "[?${count}](grey)"
ahead = "⇡${count}"
behind = "⇣${count}"

# Disable language version modules
[gradle]
