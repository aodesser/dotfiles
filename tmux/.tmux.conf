# ============================================================
#  tmux configuration — modern, minimal, powerful
# ============================================================

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Core settings ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 0          # no delay after Escape
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1      # panes start at 1
set -g renumber-windows on     # keep window numbers contiguous

# --- Mouse ---
set -g mouse on

# --- Vi mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Splits (intuitive) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resize ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Quick layouts ---
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout tiled

# --- Window switching ---
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# --- Pane sync (broadcast) ---
bind S setw synchronize-panes \; display "Sync: #{?synchronize-panes,ON,OFF}"

# ============================================================
#  Colors — dark catppuccin-inspired palette
# ============================================================

# --- [1] Pane borders — box-drawing chars, clean grid look ---
set -g pane-border-lines heavy
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# --- [4] Active pane dimming — inactive panes are subtly muted ---
set -g window-style        "bg=#181825,fg=#6c7086"   # inactive: dark bg, muted fg
set -g window-active-style "bg=#1e1e2e,fg=#cdd6f4"   # active:   normal bg, full fg

# ============================================================
#  Status bar — [1] TOP position
# ============================================================
set -g status-style    "bg=#11111b,fg=#cdd6f4"
set -g status-position top                          # moved to top
set -g status-justify  left

# --- [2] Zoom indicator: full bar shifts color when a pane is zoomed ---
set -g status-style "#{?window_zoomed_flag,bg=#2d1b4e fg=#cba6f7,bg=#11111b fg=#cdd6f4}"

# Left: session name badge
set -g status-left-length 32
set -g status-left \
  "#{?window_zoomed_flag,\
#[bg=#cba6f7 fg=#1e1e2e bold] #S  ZOOM #[bg=#11111b fg=#cba6f7],\
#[bg=#89b4fa fg=#1e1e2e bold] #S #[bg=#11111b fg=#89b4fa]}"

# Right: host · date · time
set -g status-right-length 64
set -g status-right \
  "#{?window_zoomed_flag,\
#[fg=#9399b2] #H #[fg=#45475a]│#[fg=#9399b2] %a %b %-d #[fg=#45475a]│#[fg=#cba6f7 bold] %H:%M ,\
#[fg=#6c7086] #H #[fg=#313244]│#[fg=#a6adc8] %a %b %-d #[fg=#313244]│#[fg=#cdd6f4 bold] %H:%M }"

# Window tabs — normal
setw -g window-status-style         "bg=#11111b,fg=#6c7086"
setw -g window-status-format        " #I #W "

# Window tabs — active (+ zoom badge handled by status-left above)
setw -g window-status-current-style "bg=#313244,fg=#cdd6f4,bold"
setw -g window-status-current-format \
  "#{?window_zoomed_flag,\
#[bg=#2d1b4e fg=#cba6f7 bold] #I #W  ,\
 #I #W }"

# Window activity
setw -g monitor-activity on
set  -g visual-activity off
setw -g window-status-activity-style "bg=#11111b,fg=#f38ba8"

# Messages
set -g message-style         "bg=#313244,fg=#f9e2af,bold"
set -g message-command-style "bg=#313244,fg=#cba6f7"

# Mode (copy/search) highlight
setw -g mode-style "bg=#45475a,fg=#cdd6f4"

# ============================================================
#  [5] Popup scratchpad with clock pane  (prefix + Space)
# ============================================================
bind Space display-popup -E -w 80% -h 75% \
  "tmux new-session -A -s scratch \; \
   set-hook -g after-new-session '' \; \
   if-shell 'tmux list-panes -t scratch 2>/dev/null | wc -l | grep -q 1' \
     'split-window -t scratch -l 4 -b \"watch -tn1 date +\\\"%A %B %-d · %H:%M:%S\\\"\"' ''"

# ============================================================
#  Sessionizer  (prefix + f — fuzzy-find or create session)
# ============================================================
bind f display-popup -E -w 60% -h 50% \
  "tmux list-sessions -F '#S' 2>/dev/null | fzf --prompt='session: ' \
   | xargs -I{} tmux switch-client -t {} 2>/dev/null \
   || true"

# ============================================================
#  [6] Project mode  (prefix + P — cd into project, name session)
# ============================================================
bind P display-popup -E -w 65% -h 55% \
  "fd --type d --hidden --max-depth 4 . ~ 2>/dev/null \
     | grep -E '(Code|Projects|src|work|dev)' \
     | fzf --prompt='project: ' --preview 'ls -la {}' \
   | xargs -I{} tmux new-session -A -s \"\$(basename {})\" -c {}"
